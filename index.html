<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>CBRE Marketing Hub</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --dk:#0d2b21;
  --g:#006A4D;
  --gb:#00965E;
  --light:#f5f5f0;
  --border:#d8d8d0;
  --text:#1a1a1a;
  --muted:#666;
  --card:#ffffff;
  --sidebar:#0d2b21;
}
body{font-family:'Calibre','Franklin Gothic Medium',Arial,sans-serif;background:var(--light);color:var(--text);min-height:100vh;display:flex;flex-direction:column;}

/* ── LOGIN SCREEN ── */
#login-screen{
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;background:var(--dk);
  position:fixed;inset:0;z-index:1000;
  transition:opacity .4s ease;
}
.login-box{
  background:#fff;width:360px;padding:0;border-radius:4px;overflow:hidden;
  box-shadow:0 32px 80px rgba(0,0,0,.5);
}
.login-head{background:var(--dk);padding:32px;text-align:center;}
.login-logo{font-size:28px;font-weight:900;color:#fff;letter-spacing:-.02em;}
.login-logo span{color:var(--gb);}
.login-sub{font-size:11px;color:rgba(255,255,255,.5);margin-top:4px;text-transform:uppercase;letter-spacing:.1em;}
.login-body{padding:28px;}
.lf{display:flex;flex-direction:column;gap:4px;margin-bottom:16px;}
.lf label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;}
.lf input{
  width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:3px;
  font-size:13px;font-family:inherit;outline:none;color:var(--text);
  transition:border-color .15s;
}
.lf input:focus{border-color:var(--g);}
.login-btn{
  width:100%;padding:11px;background:var(--g);color:#fff;border:none;border-radius:3px;
  font-size:13px;font-weight:700;cursor:pointer;letter-spacing:.03em;
  transition:background .15s;
}
.login-btn:hover{background:var(--gb);}
.login-err{font-size:11px;color:#c0392b;margin-top:8px;text-align:center;min-height:16px;}

/* ── MASTHEAD ── */
.masthead{
  height:52px;background:var(--dk);display:flex;align-items:center;
  padding:0 24px;gap:16px;flex-shrink:0;position:sticky;top:0;z-index:100;
  box-shadow:0 2px 12px rgba(0,0,0,.25);
}
.mast-logo{font-size:14px;font-weight:900;color:#fff;letter-spacing:-.01em;}
.mast-logo span{color:var(--gb);}
.mast-divider{width:1px;height:22px;background:rgba(255,255,255,.15);}
.mast-nav{display:flex;gap:0;flex:1;}
.mast-nav a{
  padding:0 14px;height:52px;display:flex;align-items:center;
  font-size:10px;font-weight:700;color:rgba(255,255,255,.5);
  text-decoration:none;text-transform:uppercase;letter-spacing:.07em;
  border-bottom:2px solid transparent;transition:color .15s;cursor:pointer;
}
.mast-nav a:hover,.mast-nav a.active{color:#fff;border-bottom-color:var(--gb);}
.mast-right{display:flex;align-items:center;gap:12px;margin-left:auto;}
.mast-user{font-size:11px;color:rgba(255,255,255,.5);}
.mast-user span{color:#fff;font-weight:700;}
.logout-btn{
  padding:5px 12px;font-size:10px;font-weight:700;background:transparent;
  color:rgba(255,255,255,.5);border:1px solid rgba(255,255,255,.2);
  border-radius:3px;cursor:pointer;text-transform:uppercase;letter-spacing:.06em;
  transition:all .15s;
}
.logout-btn:hover{color:#fff;border-color:rgba(255,255,255,.5);}

/* ── ADMIN PANEL (manage portfolios/properties) ── */
.admin-bar{
  background:#fff;border-bottom:1px solid var(--border);
  padding:12px 24px;display:flex;align-items:center;gap:10px;
  flex-shrink:0;
}
.admin-bar.hidden{display:none;}
.admin-label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-right:4px;}
.admin-btn{
  padding:6px 14px;font-size:11px;font-weight:700;border-radius:3px;cursor:pointer;
  border:1px solid var(--border);background:#fff;color:var(--text);
  transition:all .15s;
}
.admin-btn:hover{background:var(--g);color:#fff;border-color:var(--g);}
.admin-btn.primary{background:var(--g);color:#fff;border-color:var(--g);}
.admin-btn.primary:hover{background:var(--gb);}
.admin-btn.danger{background:#fff;color:#c0392b;border-color:#e8c0c0;}
.admin-btn.danger:hover{background:#c0392b;color:#fff;}

/* ── PAGE LAYOUT ── */
.page{display:none;flex:1;flex-direction:column;}
.page.active{display:flex;}

/* ── PORTFOLIOS LIST ── */
.page-content{padding:32px 24px;flex:1;}
.page-header{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:24px;}
.page-title{font-size:22px;font-weight:900;color:var(--dk);letter-spacing:-.02em;}
.page-sub{font-size:12px;color:var(--muted);margin-top:3px;}
.portfolio-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;}
.portfolio-card{
  background:var(--card);border:1px solid var(--border);border-radius:4px;
  overflow:hidden;cursor:pointer;transition:all .2s;
  box-shadow:0 2px 8px rgba(0,0,0,.04);
}
.portfolio-card:hover{box-shadow:0 8px 24px rgba(0,0,0,.1);transform:translateY(-2px);border-color:var(--g);}
.portfolio-card-head{background:var(--dk);padding:18px 20px;display:flex;align-items:center;justify-content:space-between;}
.portfolio-card-name{font-size:13px;font-weight:700;color:#fff;letter-spacing:-.01em;}
.portfolio-card-badge{background:rgba(255,255,255,.1);color:rgba(255,255,255,.7);font-size:9px;font-weight:700;padding:3px 8px;border-radius:2px;text-transform:uppercase;letter-spacing:.07em;}
.portfolio-card-body{padding:14px 20px;}
.portfolio-card-count{font-size:12px;color:var(--muted);}
.portfolio-card-count strong{color:var(--text);font-weight:700;}
.portfolio-card-actions{padding:0 20px 14px;display:flex;gap:8px;align-items:center;}
.card-btn{padding:5px 12px;font-size:10px;font-weight:700;border-radius:2px;cursor:pointer;border:none;text-transform:uppercase;letter-spacing:.06em;transition:all .15s;}
.card-btn-open{background:var(--g);color:#fff;}
.card-btn-open:hover{background:var(--gb);}
.card-btn-del{background:transparent;color:#c0392b;border:1px solid #e8c0c0;padding:4px 10px;font-size:10px;font-weight:700;border-radius:2px;cursor:pointer;text-transform:uppercase;letter-spacing:.06em;transition:all .15s;}
.card-btn-del:hover{background:#c0392b;color:#fff;border-color:#c0392b;}
.card-btn-del.hidden{display:none;}

/* ── PROPERTIES LIST (inside portfolio) ── */
.breadcrumb{display:flex;align-items:center;gap:8px;margin-bottom:20px;font-size:11px;color:var(--muted);}
.breadcrumb a{color:var(--g);cursor:pointer;font-weight:700;text-decoration:none;}
.breadcrumb a:hover{text-decoration:underline;}
.breadcrumb-sep{color:var(--border);}
.property-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px;}
.property-card{
  background:var(--card);border:1px solid var(--border);border-radius:4px;
  overflow:hidden;cursor:pointer;transition:all .2s;
  box-shadow:0 2px 8px rgba(0,0,0,.04);
}
.property-card:hover{box-shadow:0 8px 24px rgba(0,0,0,.1);transform:translateY(-2px);border-color:var(--gb);}
.property-card-thumb{height:100px;background:var(--dk);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}
.property-card-thumb-label{font-size:11px;color:rgba(255,255,255,.4);font-weight:700;text-transform:uppercase;letter-spacing:.07em;}
.property-thumb-bar{position:absolute;bottom:0;left:0;right:0;height:3px;background:var(--gb);}
.property-card-body{padding:12px 14px;}
.property-card-name{font-size:13px;font-weight:700;color:var(--text);}
.property-card-meta{font-size:10px;color:var(--muted);margin-top:3px;text-transform:uppercase;letter-spacing:.06em;}
.property-card-actions{padding:0 14px 12px;display:flex;gap:7px;}

/* ── MODAL ── */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;align-items:center;justify-content:center;}
.modal-bg.open{display:flex;}
.modal{background:#fff;border-radius:4px;padding:24px;width:400px;max-width:95vw;box-shadow:0 24px 60px rgba(0,0,0,.3);}
.modal-title{font-size:14px;font-weight:900;color:var(--dk);margin-bottom:16px;letter-spacing:-.01em;}
.modal-field{display:flex;flex-direction:column;gap:4px;margin-bottom:14px;}
.modal-field label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;}
.modal-field input,.modal-field select{
  padding:8px 10px;border:1px solid var(--border);border-radius:3px;
  font-size:12px;font-family:inherit;outline:none;color:var(--text);
}
.modal-field input:focus,.modal-field select:focus{border-color:var(--g);}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;}
.modal-cancel{padding:8px 16px;font-size:11px;font-weight:700;background:#fff;color:var(--muted);border:1px solid var(--border);border-radius:3px;cursor:pointer;}
.modal-cancel:hover{background:var(--light);}
.modal-confirm{padding:8px 16px;font-size:11px;font-weight:700;background:var(--g);color:#fff;border:none;border-radius:3px;cursor:pointer;}
.modal-confirm:hover{background:var(--gb);}

/* ── EMPTY STATE ── */
.empty{padding:48px;text-align:center;color:var(--muted);}
.empty-icon{font-size:32px;margin-bottom:12px;}
.empty-title{font-size:14px;font-weight:700;color:var(--text);margin-bottom:6px;}
.empty-sub{font-size:12px;line-height:1.6;}

/* ── ADMIN ONLY marker ── */
.admin-only{display:none;}
body.is-admin .admin-only{display:flex;}
body.is-admin .admin-only-inline{display:inline;}
.admin-only-inline{display:none;}
</style>
</head>
<body>

<!-- ═══════════════════════════════════════
     LOGIN SCREEN
════════════════════════════════════════ -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-head">
      <div class="login-logo">CBRE<span>.</span></div>
      <div class="login-sub">Marketing Hub</div>
    </div>
    <div class="login-body">
      <div class="lf"><label>Email Address</label><input type="email" id="login-email" placeholder="you@example.com" autocomplete="username"></div>
      <div class="lf"><label>Password</label><input type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password"></div>
      <button class="login-btn" onclick="doLogin()">Sign In</button>
      <div class="login-err" id="login-err"></div>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════
     MASTHEAD
════════════════════════════════════════ -->
<div class="masthead" id="masthead" style="display:none;">
  <div class="mast-logo">CBRE<span>.</span></div>
  <div class="mast-divider"></div>
  <nav class="mast-nav">
    <a class="active" onclick="showPage('portfolios')" id="nav-portfolios">Portfolios</a>
  </nav>
  <div class="mast-right">
    <div class="mast-user">Signed in as <span id="mast-username"></span></div>
    <button class="logout-btn" onclick="doLogout()">Sign Out</button>
  </div>
</div>

<!-- ═══════════════════════════════════════
     ADMIN BAR
════════════════════════════════════════ -->
<div class="admin-bar hidden admin-only" id="admin-bar">
  <span class="admin-label">Admin</span>
  <button class="admin-btn primary" onclick="openNewPortfolioModal()">+ New Portfolio</button>
  <button class="admin-btn" onclick="openManageUsersInfo()">Manage Users</button>
</div>

<!-- ═══════════════════════════════════════
     PAGE: PORTFOLIOS
════════════════════════════════════════ -->
<div class="page" id="page-portfolios">
  <div class="page-content">
    <div class="page-header">
      <div>
        <div class="page-title">Portfolios</div>
        <div class="page-sub">Select a portfolio to view its properties</div>
      </div>
    </div>
    <div class="portfolio-grid" id="portfolio-grid">
      <div class="empty"><div class="empty-icon">📁</div><div class="empty-title">No portfolios yet</div><div class="empty-sub">An administrator will create portfolios here.</div></div>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════
     PAGE: PROPERTIES (inside a portfolio)
════════════════════════════════════════ -->
<div class="page" id="page-properties">
  <div class="page-content">
    <div class="breadcrumb">
      <a onclick="showPage('portfolios')">Portfolios</a>
      <span class="breadcrumb-sep">›</span>
      <span id="breadcrumb-portfolio">Portfolio</span>
    </div>
    <div class="page-header">
      <div>
        <div class="page-title" id="props-page-title">Portfolio</div>
        <div class="page-sub">Select a property to open its marketing builder</div>
      </div>
      <div class="admin-only" style="gap:8px;">
        <button class="admin-btn primary" onclick="openNewPropertyModal()">+ Add Property</button>
      </div>
    </div>
    <div class="property-list" id="property-list"></div>
  </div>
</div>

<!-- ═══════════════════════════════════════
     MODAL: NEW PORTFOLIO
════════════════════════════════════════ -->
<div class="modal-bg" id="modal-portfolio">
  <div class="modal">
    <div class="modal-title">New Portfolio</div>
    <div class="modal-field"><label>Portfolio Name</label><input type="text" id="new-portfolio-name" placeholder="e.g. Portfolio 187"></div>
    <div class="modal-actions">
      <button class="modal-cancel" onclick="closeModal('modal-portfolio')">Cancel</button>
      <button class="modal-confirm" onclick="createPortfolio()">Create Portfolio</button>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════
     MODAL: NEW PROPERTY
════════════════════════════════════════ -->
<div class="modal-bg" id="modal-property">
  <div class="modal">
    <div class="modal-title">Add Property</div>
    <div class="modal-field"><label>Property Name</label><input type="text" id="new-property-name" placeholder="e.g. Sunbury VIC"></div>
    <div class="modal-actions">
      <button class="modal-cancel" onclick="closeModal('modal-property')">Cancel</button>
      <button class="modal-confirm" onclick="createProperty()">Add Property</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
// CONFIGURATION — Replace these with your Supabase credentials
// ═══════════════════════════════════════════════════════════════
const SUPABASE_URL = 'https://pgsgjafgetdvuctmpibf.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_MzEoGumO7jNqf4dn9pKNFA_meRyU-0O';

// ─── DEMO / LOCAL MODE ─────────────────────────────────────────
// While you haven't connected Supabase yet, the app runs in local
// demo mode using localStorage. All data persists in your browser.
// Switch to Supabase by filling in the credentials above.
const IS_DEMO = true; // Uses hardcoded logins above. Set to false only when Supabase Auth is fully configured.

// ─── HARDCODED DEMO USERS ──────────────────────────────────────
// In real mode, auth is handled by Supabase.
// In demo mode, add users here: { email, password, role }
const DEMO_USERS = [
  { email: 'bryan.karman@cbre.com',  password: 'Surfing1987',  role: 'admin', name: 'Bryan Karman' },
  { email: 'connie.duan@cbre.com',   password: 'Password123',  role: 'user',  name: 'Connie Duan' },
];

// ═══════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════
let currentUser = null;
let currentPortfolioId = null;
let portfolios = [];   // [{id, name, createdAt}]
let properties = {};   // {portfolioId: [{id, name, portfolioId}]}

// ═══════════════════════════════════════════════════════════════
// LOCAL STORAGE HELPERS (demo mode)
// ═══════════════════════════════════════════════════════════════
function lsGet(k){ try{ return JSON.parse(localStorage.getItem('cbre_hub_'+k)||'null'); }catch(e){return null;} }
function lsSet(k,v){ try{ localStorage.setItem('cbre_hub_'+k, JSON.stringify(v)); }catch(e){} }

function loadDemoData(){
  portfolios = lsGet('portfolios') || [
    {id:'p1', name:'Portfolio 185', createdAt: new Date().toISOString()},
    {id:'p2', name:'Portfolio 186', createdAt: new Date().toISOString()},
  ];
  const storedProps = lsGet('properties') || {
    'p1': [{id:'pr1', name:'Sunbury VIC', portfolioId:'p1'},{id:'pr2', name:'Melton VIC', portfolioId:'p1'}],
    'p2': [{id:'pr3', name:'Wagga Wagga NSW', portfolioId:'p2'}],
  };
  properties = storedProps;
}

function saveDemoData(){
  lsSet('portfolios', portfolios);
  lsSet('properties', properties);
}

// ═══════════════════════════════════════════════════════════════
// AUTH
// ═══════════════════════════════════════════════════════════════
function doLogin(){
  const email = document.getElementById('login-email').value.trim().toLowerCase();
  const pass  = document.getElementById('login-pass').value;
  const err   = document.getElementById('login-err');
  err.textContent = '';

  if(IS_DEMO){
    const user = DEMO_USERS.find(u => u.email === email && u.password === pass);
    if(!user){ err.textContent = 'Incorrect email or password.'; return; }
    currentUser = user;
    lsSet('session', user);
    onLoginSuccess();
  } else {
    // Supabase auth — swap in when credentials are configured
    err.textContent = 'Supabase not yet configured.';
  }
}

document.addEventListener('keydown', e => {
  if(e.key === 'Enter' && !currentUser) doLogin();
});

function doLogout(){
  currentUser = null;
  lsSet('session', null);
  location.reload();
}

function onLoginSuccess(){
  document.getElementById('login-screen').style.opacity = '0';
  setTimeout(()=>{ document.getElementById('login-screen').style.display = 'none'; }, 400);
  document.getElementById('masthead').style.display = 'flex';
  document.getElementById('mast-username').textContent = currentUser.name;

  if(currentUser.role === 'admin'){
    document.body.classList.add('is-admin');
    document.getElementById('admin-bar').classList.remove('hidden');
  }

  loadDemoData();
  showPage('portfolios');
}

// ═══════════════════════════════════════════════════════════════
// PAGE ROUTING
// ═══════════════════════════════════════════════════════════════
function showPage(name){
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.mast-nav a').forEach(a => a.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  const navEl = document.getElementById('nav-'+name);
  if(navEl) navEl.classList.add('active');

  if(name === 'portfolios') renderPortfolios();
  if(name === 'properties') renderProperties();
}

// ═══════════════════════════════════════════════════════════════
// PORTFOLIOS
// ═══════════════════════════════════════════════════════════════
function renderPortfolios(){
  const grid = document.getElementById('portfolio-grid');
  if(!portfolios.length){
    grid.innerHTML = '<div class="empty"><div class="empty-icon">📁</div><div class="empty-title">No portfolios yet</div><div class="empty-sub">Click "+ New Portfolio" above to get started.</div></div>';
    return;
  }
  grid.innerHTML = portfolios.map(p => {
    const propCount = (properties[p.id]||[]).length;
    const isAdmin = currentUser && currentUser.role === 'admin';
    return `
    <div class="portfolio-card">
      <div class="portfolio-card-head">
        <div class="portfolio-card-name">${escHtml(p.name)}</div>
        <div class="portfolio-card-badge">${propCount} propert${propCount===1?'y':'ies'}</div>
      </div>
      <div class="portfolio-card-body">
        <div class="portfolio-card-count"><strong>${propCount}</strong> propert${propCount===1?'y':'ies'} in this portfolio</div>
      </div>
      <div class="portfolio-card-actions">
        <button class="card-btn card-btn-open" onclick="openPortfolio('${p.id}')">Open →</button>
        ${isAdmin ? `<button class="card-btn-del" onclick="deletePortfolio(event,'${p.id}')">Delete</button>` : ''}
      </div>
    </div>`;
  }).join('');
}

function openPortfolio(id){
  currentPortfolioId = id;
  const p = portfolios.find(x => x.id === id);
  document.getElementById('breadcrumb-portfolio').textContent = p.name;
  document.getElementById('props-page-title').textContent = p.name;
  showPage('properties');
}

function openNewPortfolioModal(){
  document.getElementById('new-portfolio-name').value = '';
  document.getElementById('modal-portfolio').classList.add('open');
  setTimeout(()=> document.getElementById('new-portfolio-name').focus(), 50);
}

function createPortfolio(){
  const name = document.getElementById('new-portfolio-name').value.trim();
  if(!name) return;
  const id = 'p' + Date.now();
  portfolios.unshift({id, name, createdAt: new Date().toISOString()});
  saveDemoData();
  closeModal('modal-portfolio');
  renderPortfolios();
}

function deletePortfolio(e, id){
  e.stopPropagation();
  if(!confirm('Delete this portfolio and all its properties? This cannot be undone.')) return;
  portfolios = portfolios.filter(p => p.id !== id);
  delete properties[id];
  saveDemoData();
  renderPortfolios();
}

// ═══════════════════════════════════════════════════════════════
// PROPERTIES
// ═══════════════════════════════════════════════════════════════
function renderProperties(){
  const list = document.getElementById('property-list');
  const props = properties[currentPortfolioId] || [];
  if(!props.length){
    const isAdmin = currentUser && currentUser.role === 'admin';
    list.innerHTML = `<div class="empty" style="grid-column:1/-1;"><div class="empty-icon">🏢</div><div class="empty-title">No properties yet</div><div class="empty-sub">${isAdmin ? 'Click "+ Add Property" to add the first property.' : 'No properties have been added to this portfolio yet.'}</div></div>`;
    return;
  }
  const isAdmin = currentUser && currentUser.role === 'admin';
  list.innerHTML = props.map(pr => `
    <div class="property-card">
      <div class="property-card-thumb">
        <div class="property-card-thumb-label">Marketing Builder</div>
        <div class="property-thumb-bar"></div>
      </div>
      <div class="property-card-body">
        <div class="property-card-name">${escHtml(pr.name)}</div>
        <div class="property-card-meta">${escHtml(portfolios.find(p=>p.id===pr.portfolioId)?.name||'')}</div>
      </div>
      <div class="property-card-actions">
        <button class="card-btn card-btn-open" onclick="openBuilder('${pr.portfolioId}','${pr.id}')">Open Builder →</button>
        ${isAdmin ? `<button class="card-btn-del" onclick="deleteProperty(event,'${pr.portfolioId}','${pr.id}')">Delete</button>` : ''}
      </div>
    </div>
  `).join('');
}

function openNewPropertyModal(){
  document.getElementById('new-property-name').value = '';
  document.getElementById('modal-property').classList.add('open');
  setTimeout(()=> document.getElementById('new-property-name').focus(), 50);
}

function createProperty(){
  const name = document.getElementById('new-property-name').value.trim();
  if(!name) return;
  const id = 'pr' + Date.now();
  if(!properties[currentPortfolioId]) properties[currentPortfolioId] = [];
  properties[currentPortfolioId].push({id, name, portfolioId: currentPortfolioId});
  saveDemoData();
  closeModal('modal-property');
  renderProperties();
  // Also update portfolio card count
}

function deleteProperty(e, portfolioId, propId){
  e.stopPropagation();
  if(!confirm('Delete this property? This cannot be undone.')) return;
  properties[portfolioId] = (properties[portfolioId]||[]).filter(p => p.id !== propId);
  saveDemoData();
  renderProperties();
}

function openBuilder(portfolioId, propertyId){
  // Pass context to the builder via URL params
  // The builder file reads these to know which project to load/save
  const portfolio = portfolios.find(p=>p.id===portfolioId);
  const props = properties[portfolioId]||[];
  const property = props.find(p=>p.id===propertyId);
  const params = new URLSearchParams({
    portfolioId,
    propertyId,
    portfolioName: portfolio?.name || '',
    propertyName: property?.name || '',
  });
  window.location.href = `builder.html?${params.toString()}`;
}

function openManageUsersInfo(){
  alert('User management is done via the Supabase dashboard.\n\nGo to supabase.com → Authentication → Users to add, remove, or reset passwords for team members.\n\nIn demo mode, users are configured in the DEMO_USERS array at the top of this file.');
}

// ═══════════════════════════════════════════════════════════════
// MODAL HELPERS
// ═══════════════════════════════════════════════════════════════
function closeModal(id){
  document.getElementById(id).classList.remove('open');
}
document.querySelectorAll('.modal-bg').forEach(m=>{
  m.addEventListener('click', e => { if(e.target===m) m.classList.remove('open'); });
});
document.addEventListener('keydown', e => {
  if(e.key === 'Escape') document.querySelectorAll('.modal-bg.open').forEach(m=>m.classList.remove('open'));
});
document.addEventListener('keydown', e => {
  if(e.key === 'Enter'){
    if(document.getElementById('modal-portfolio').classList.contains('open')) createPortfolio();
    if(document.getElementById('modal-property').classList.contains('open')) createProperty();
  }
});

function escHtml(str){ const d=document.createElement('div');d.textContent=str;return d.innerHTML; }

// AUTO-LOGIN (restore session)
// ═══════════════════════════════════════════════════════════════
(function(){
  const saved = lsGet('session');
  if(saved && saved.email){
    const user = DEMO_USERS.find(u => u.email === saved.email);
    if(user){ currentUser = user; onLoginSuccess(); return; }
  }
})();
</script>
