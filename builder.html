<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>CBRE Marketing Builder</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--dk:#0d2b21;--g:#4a9b6f;--gb:#5bbf7a;}
body{font-family:'Calibre','Franklin Gothic Medium',Arial,sans-serif;background:#1c1c1c;height:100vh;display:flex;flex-direction:column;overflow:hidden;}

/* ── MASTHEAD (home navigation bar) ── */
.masthead{height:36px;background:#080808;border-bottom:1px solid #1a1a1a;display:flex;align-items:center;padding:0 10px;gap:10px;flex-shrink:0;}
.mast-home{display:flex;align-items:center;gap:6px;text-decoration:none;color:rgba(255,255,255,.55);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;padding:4px 8px;border-radius:2px;border:1px solid rgba(255,255,255,.1);transition:all .15s;cursor:pointer;}
.mast-home:hover{color:#fff;border-color:rgba(255,255,255,.3);}
.mast-home-icon{font-size:12px;}
.mast-divider{width:1px;height:16px;background:rgba(255,255,255,.1);}
.mast-context{font-size:10px;color:rgba(255,255,255,.35);display:flex;align-items:center;gap:6px;}
.mast-context-sep{color:rgba(255,255,255,.2);}
.mast-context-portfolio{color:rgba(255,255,255,.5);font-weight:700;}
.mast-context-property{color:var(--gb);font-weight:700;}
.mast-right-info{margin-left:auto;display:flex;align-items:center;gap:10px;}
.mast-user{font-size:9px;color:rgba(255,255,255,.3);}
.mast-user span{color:rgba(255,255,255,.6);}
.mast-logout{font-size:9px;color:rgba(255,255,255,.3);cursor:pointer;text-decoration:none;padding:2px 6px;border:1px solid rgba(255,255,255,.1);border-radius:2px;}
.mast-logout:hover{color:#fff;border-color:rgba(255,255,255,.3);}

/* ── CLOUD STATUS INDICATOR ── */
.cloud-status{display:flex;align-items:center;gap:5px;font-size:9px;color:rgba(255,255,255,.35);padding:2px 8px;border-radius:2px;border:1px solid rgba(255,255,255,.08);}
.cloud-dot{width:6px;height:6px;border-radius:50%;background:#666;transition:background .3s;}
.cloud-status.saved .cloud-dot{background:var(--gb);}
.cloud-status.saving .cloud-dot{background:#f39c12;animation:blink .6s infinite;}
.cloud-status.error .cloud-dot{background:#e74c3c;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.3;}}

/* ── TOP BAR ── */
.topbar{height:46px;background:#111;border-bottom:1px solid #2a2a2a;display:flex;align-items:center;padding:0 10px;gap:6px;flex-shrink:0;}
.logo-txt{font-size:13px;font-weight:900;color:var(--gb);letter-spacing:-.01em;margin-right:8px;white-space:nowrap;}
.tabs{display:flex;flex:1;overflow-x:auto;gap:0;}
.tab{padding:0 11px;height:46px;font-size:10px;font-weight:700;cursor:pointer;color:rgba(255,255,255,.4);border:none;background:none;text-transform:uppercase;letter-spacing:.07em;white-space:nowrap;border-bottom:2px solid transparent;flex-shrink:0;transition:all .15s;}
.tab.active{color:#fff;border-bottom-color:var(--gb);}
.tab:hover:not(.active){color:rgba(255,255,255,.75);}
.tab.hidden-tab{display:none;}
.topbar-right{display:flex;align-items:center;gap:8px;flex-shrink:0;margin-left:auto;}
.zoom-lbl{font-size:10px;color:#777;}
#zoom-range{width:80px;accent-color:var(--gb);}
.zoom-pct{font-size:11px;color:#ccc;min-width:30px;}
.tb-btn{padding:5px 12px;font-size:11px;font-weight:700;cursor:pointer;border:none;border-radius:3px;white-space:nowrap;}
.btn-save{background:#2a5a3a;color:#fff;}
.btn-save:hover{background:#3a7a4e;}
.btn-undo{background:#2a2a3a;color:#aab;border:1px solid #445;}
.btn-undo:hover{background:#3a3a4e;color:#fff;}
.btn-dl{background:var(--gb);color:#fff;}
.btn-dl:hover{background:#4aaa65;}
.btn-dl:disabled{background:#444;cursor:wait;}

/* ── MARKETING ITEMS DROPDOWN ── */
.mi-wrap{position:relative;}
.btn-mi{background:#1a3a2a;color:var(--gb);border:1px solid #2a5a3a;padding:5px 12px;font-size:11px;font-weight:700;cursor:pointer;border-radius:3px;white-space:nowrap;}
.btn-mi:hover{background:#2a4a38;}
.mi-dropdown{
  display:none;position:absolute;right:0;top:calc(100% + 4px);
  background:#1a1a1a;border:1px solid #333;border-radius:3px;
  padding:8px 0;min-width:200px;z-index:500;
  box-shadow:0 8px 24px rgba(0,0,0,.5);
}
.mi-dropdown.open{display:block;}
.mi-head{padding:4px 14px 8px;font-size:9px;color:#555;text-transform:uppercase;letter-spacing:.08em;border-bottom:1px solid #2a2a2a;margin-bottom:4px;}
.mi-item{display:flex;align-items:center;gap:9px;padding:6px 14px;cursor:pointer;transition:background .1s;}
.mi-item:hover{background:#252525;}
.mi-item input[type=checkbox]{accent-color:var(--gb);width:13px;height:13px;cursor:pointer;}
.mi-item label{font-size:11px;color:#ccc;cursor:pointer;flex:1;user-select:none;}
.mi-item.disabled label{color:#555;}

/* ── LAYOUT ── */
.app{display:flex;flex:1;overflow:hidden;}

/* ── LEFT SIDEBAR ── */
.sb{width:250px;min-width:230px;background:#191919;border-right:1px solid #2a2a2a;display:flex;flex-direction:column;overflow:hidden;}
.sb-scroll{flex:1;overflow-y:auto;padding:9px 10px;display:flex;flex-direction:column;gap:5px;}
.fl{display:flex;flex-direction:column;gap:2px;}
.fl label{font-size:10px;font-weight:700;color:#777;text-transform:uppercase;letter-spacing:.06em;}
.fl input,.fl textarea{width:100%;font-size:11px;padding:5px 6px;border:1px solid #333;border-radius:2px;background:#242424;color:#ddd;font-family:inherit;resize:vertical;outline:none;}
.fl input:focus,.fl textarea:focus{border-color:var(--g);}
.fl textarea{min-height:50px;line-height:1.5;}
.sec{font-size:10px;font-weight:700;color:#555;text-transform:uppercase;letter-spacing:.07em;padding:6px 0 2px;border-top:1px solid #2a2a2a;margin-top:2px;}
.uz{border:1.5px dashed #444;border-radius:2px;padding:7px;text-align:center;cursor:pointer;font-size:11px;color:#777;background:#222;}
.uz:hover{background:#2a2a2a;}
.uz input{display:none;}
.add-btn{width:100%;padding:6px;font-size:11px;cursor:pointer;border:1px solid #444;border-radius:2px;background:#242424;color:#ccc;text-align:left;}
.add-btn:hover{background:#2e2e2e;color:#fff;}
/* Upload progress */
.upload-progress{font-size:9px;color:var(--gb);margin-top:3px;display:none;}

/* ── RIGHT PROPERTIES PANEL ── */
.props{width:220px;min-width:200px;background:#191919;border-left:1px solid #2a2a2a;display:flex;flex-direction:column;overflow:hidden;}
.props-head{padding:8px 10px;font-size:10px;font-weight:700;color:#777;text-transform:uppercase;letter-spacing:.07em;border-bottom:1px solid #2a2a2a;}
.props-scroll{flex:1;overflow-y:auto;padding:9px 10px;display:flex;flex-direction:column;gap:8px;}
.props-empty{padding:14px 10px;font-size:11px;color:#555;line-height:1.6;}
.pf{display:flex;flex-direction:column;gap:3px;}
.pf label{font-size:10px;color:#666;font-weight:700;text-transform:uppercase;letter-spacing:.05em;}
.pf input[type=text],.pf input[type=number],.pf select,.pf textarea{width:100%;font-size:11px;padding:4px 6px;border:1px solid #333;border-radius:2px;background:#242424;color:#ddd;outline:none;font-family:inherit;}
.pf input[type=text]:focus,.pf input[type=number]:focus,.pf select:focus{border-color:var(--g);}
.pf textarea{resize:vertical;min-height:50px;line-height:1.5;}
.pf-row{display:flex;gap:5px;}
.pf-row .pf{flex:1;}
.color-row{display:flex;align-items:center;gap:6px;}
.color-row input[type=color]{width:32px;height:28px;border:1px solid #444;border-radius:2px;background:none;cursor:pointer;padding:1px;}
.color-row input[type=text]{flex:1;}
.props-del-btn{margin-top:4px;width:100%;padding:7px;font-size:11px;font-weight:700;cursor:pointer;border:1px solid #7a2222;border-radius:2px;background:#2a1515;color:#e06060;}
.props-del-btn:hover{background:#3a1818;color:#ff8888;}

/* ── CANVAS ── */

// ════════════════════════════════════════════════════════════════
// CLOUD SAVE STATUS

function setCloudStatus(status, text){
  const el = document.getElementById('cloud-status');
  const lbl = document.getElementById('cloud-label');
  el.className = 'cloud-status ' + status;
  lbl.textContent = text;
}

// ════════════════════════════════════════════════════════════════
// MARKETING ITEMS DROPDOWN
// ════════════════════════════════════════════════════════════════
let hiddenTabs = new Set();

function toggleMIDropdown(){
  document.getElementById('mi-dropdown').classList.toggle('open');
}
// Close dropdown on outside click
document.addEventListener('click', e => {
  const wrap = document.querySelector('.mi-wrap');
  if(wrap && !wrap.contains(e.target)) document.getElementById('mi-dropdown').classList.remove('open');
});

function toggleTab(idx, cb){
  const tabs = document.querySelectorAll('.tab');
  const tab = tabs[idx];
  if(!tab) return;
  if(!cb.checked){
    // Hiding — if currently active, switch to first visible
    hiddenTabs.add(idx);
    tab.classList.add('hidden-tab');
    if(currentTab === idx){
      // Find first non-hidden tab
      for(let i=0; i<8; i++){
        if(!hiddenTabs.has(i)){
          switchTab(i, tabs[i]);
          break;
        }
      }
    }
  } else {
    hiddenTabs.delete(idx);
    tab.classList.remove('hidden-tab');
  }
  // Save hidden tab state
  debouncedPersist();
}

<script>
// Capture the raw HTML source as our save template BEFORE anything changes.
// We do this synchronously as the very first thing so the DOM is still pristine.
// This works with file://, served files, and Claude.ai — no fetch() needed.
const _HTML_TEMPLATE = (()=>{
  try {
    const src = document.documentElement.outerHTML;
    // Normalise: strip any previously-injected state so the template is always clean
    return src.replace(
      /(<script id="cbre-saved-data"[^>]*>)([\s\S]*?)(<\/script>)/,
      '$1__CBRE_STATE__$3'
    );
  } catch(e){ return null; }
})();

// ════════════════════════════════════════
// STATE
// ════════════════════════════════════════
let currentTab=0, zoom=0.65, selectedEl=null;
let assets={logo:'',img1:'',img2:'',img3:''};
// Saved element states per tab: { tabIdx: [{id, type, x,y,w,h, ...props}] }
let savedStates={};
let nextId=1;

// ════════════════════════════════════════
// UNDO STACK (per tab, up to 50 steps)
// ════════════════════════════════════════
const UNDO_MAX = 50;
let undoStacks = {}; // { tabIdx: [snapshot, snapshot, ...] }

function undoSnapshot(){
  const idx = currentTab;
  if(!undoStacks[idx]) undoStacks[idx] = [];
  const snap = serializeTab();
  undoStacks[idx].push(snap);
  if(undoStacks[idx].length > UNDO_MAX) undoStacks[idx].shift();
}

function undoStep(){
  const idx = currentTab;
  if(!undoStacks[idx] || undoStacks[idx].length === 0) return;
  const snap = undoStacks[idx].pop();
  // Apply snapshot directly
  savedStates[idx] = snap;
  restoreTab(idx);
  deselectAll();
  debouncedPersist();
}

// Listen for Cmd+Z / Ctrl+Z globally
document.addEventListener('keydown', function(e){
  const active = document.activeElement;
  // Don't intercept when typing in a sidebar input, textarea, or inline contenteditable
  if(active && (active.tagName === 'INPUT' || active.tagName === 'TEXTAREA')) return;
  if(active && active.contentEditable === 'true') return;
  const isMac = navigator.platform.toUpperCase().indexOf('MAC') >= 0;
  const undoKey = isMac ? (e.metaKey && e.key === 'z') : (e.ctrlKey && e.key === 'z');
  if(undoKey){
    e.preventDefault();
    undoStep();
  }
});

// ════════════════════════════════════════
// ZOOM
// ════════════════════════════════════════
function setZoom(v){
  zoom=v/100;
  document.getElementById('zoom-pct').textContent=v+'%';
  const [sw,sh]=SIZES[currentTab];
  const cw=document.getElementById('canvas-wrap');
  // Set the wrap to exactly the scaled size so the canvas-area scroll is correct
  cw.style.width=Math.round(sw*zoom)+'px';
  cw.style.height=Math.round(sh*zoom)+'px';
  // Scale the artwork inside it
  const art=document.getElementById('artwork');
  art.style.transform=`scale(${zoom})`;
  art.style.transformOrigin='top left';
  art.style.position='absolute';
  art.style.top='0';
  art.style.left='0';
}

// ════════════════════════════════════════
// ELEMENT CREATION
// ════════════════════════════════════════
function createElement(cfg){
  const art=document.getElementById('artwork');
  const el=document.createElement('div');
  el.className='el';
  el.dataset.eid=cfg.id||(nextId++);
  el.dataset.type=cfg.type||'text';
  el.dataset.field=cfg.field||'';
  el.dataset.assetKey=cfg.assetKey||'';
  el.style.cssText=`left:${cfg.x}px;top:${cfg.y}px;width:${cfg.w}px;height:${cfg.h}px;z-index:${cfg.z||2};`;

  // INNER
  const inner=document.createElement('div');
  inner.className='el-inner';

  if(cfg.type==='rect'){
    inner.style.background=cfg.bg||DK;
    if(cfg.extraStyle) inner.style.cssText+=cfg.extraStyle;
  } else if(cfg.type==='img'){
    const isLogo=(cfg.assetKey||'')==='logo';
    inner.style.background=isLogo?'transparent':'#c5ccc5';
    inner.style.display='flex';inner.style.alignItems='center';inner.style.justifyContent='center';
    const ph=document.createElement('div');
    ph.className='img-ph-txt';
    ph.style.cssText='font-size:10px;color:#aaa;pointer-events:none;';
    ph.textContent=cfg.label||'Image';
    if(!isLogo) inner.appendChild(ph);
    const im=document.createElement('img');
    const fit=isLogo?'contain':'cover';
    im.style.cssText=`position:absolute;inset:0;width:100%;height:100%;object-fit:${fit};display:none;`;
    const ak=cfg.assetKey||'';
    if(ak && assets[ak]){im.src=assets[ak];im.style.display='';ph.style.display='none';}
    inner.appendChild(im);
    el.dataset.assetKey=ak;
    // Double-click enters full crop mode (with scale handles)
    el.addEventListener('dblclick', e=>{
      e.stopPropagation();
      enterCropMode(el);
    });
  } else {
    // text
    applyTextStyle(inner, cfg);
    inner.textContent=cfg.content||'';
    inner.addEventListener('dblclick',e=>{
      e.stopPropagation();
      undoSnapshot();
      inner.contentEditable='true';
      inner.style.cursor='text';
      inner.focus();
      // Enter key → insert \n at caret position (pre-wrap renders it as a new line)
      inner.onkeydown=ev=>{
        if(ev.key==='Enter'){
          ev.preventDefault();
          const sel=window.getSelection();
          if(!sel||!sel.rangeCount) return;
          const range=sel.getRangeAt(0);
          range.deleteContents();
          const textNode=document.createTextNode('\n');
          range.insertNode(textNode);
          // Move caret after the inserted \n
          range.setStartAfter(textNode);
          range.setEndAfter(textNode);
          sel.removeAllRanges();
          sel.addRange(range);
          // Force a trailing space if at end so caret is visible on last line
          const txt=inner.textContent;
          if(txt[txt.length-1]==='\n') inner.textContent=txt+'\u200B';
        }
      };
      inner.onblur=()=>{
        inner.contentEditable='false';
        inner.style.cursor='';
        inner.onkeydown=null;
        // Strip any zero-width spaces added as caret helpers
        inner.textContent=inner.textContent.replace(/\u200B/g,'');
        // Sync edited text back to the sidebar master field
        const field=el.dataset.field;
        if(field){
          const sidebarId=fieldToSidebarId(field);
          if(sidebarId){
            const sidebarEl=document.getElementById(sidebarId);
            if(sidebarEl){
              let val=inner.textContent;
              if(field==='income' && val.startsWith('Net Income: ')) val=val.slice('Net Income: '.length);
              sidebarEl.value=val;
              globalSync();
            }
          }
        }
        debouncedPersist();
      };
    });
  }
  el.appendChild(inner);

  // Selection ring
  const ring=document.createElement('div');ring.className='el-sel-ring';el.appendChild(ring);

  // Resize handles
  ['nw','n','ne','e','se','s','sw','w'].forEach(p=>{
    const h=document.createElement('div');h.className=`rh rh-${p}`;h.dataset.h=p;
    h.addEventListener('mousedown',e=>{e.stopPropagation();startResize(e,el,p);});
    el.appendChild(h);
  });

  // ── Single unified mousedown handler ──
  // Handles: select, element drag, image pan — all with threshold so a bare
  // click never moves anything.
  el.addEventListener('mousedown', e=>{
    if(e.target.classList.contains('rh')) return;
    if(e.target.classList.contains('crop-img-rh')) return;
    if(el.classList.contains('crop-mode')) return; // crop mode handles its own events
    e.stopPropagation();
    selectElement(el);

    const sx=e.clientX, sy=e.clientY;
    let committed=false;

    // For cropped images: track whether we're panning the photo or moving the box.
    // Decision is deferred until threshold is crossed (no action on bare click).
    const img = el.dataset.type==='img' ? el.querySelector('img') : null;
    const hasCrop = img && img.dataset.cropW;
    const fw = parseFloat(el.style.width);
    const fh = parseFloat(el.style.height);
    const ox = parseFloat(el.style.left), oy = parseFloat(el.style.top);
    const imgOx = hasCrop ? parseFloat(img.style.left)||0 : 0;
    const imgOy = hasCrop ? parseFloat(img.style.top)||0  : 0;

    function mv(e){
      const dx=e.clientX-sx, dy=e.clientY-sy;
      // Do nothing until threshold crossed
      if(Math.sqrt(dx*dx+dy*dy) < DRAG_THRESHOLD) return;

      if(!committed){
        committed=true;
        undoSnapshot();
      }

      if(hasCrop){
        // Pan the image inside the frame
        const rawX = imgOx + (e.clientX-sx)/zoom;
        const rawY = imgOy + (e.clientY-sy)/zoom;
        const iw=parseFloat(img.style.width), ih=parseFloat(img.style.height);
        const {nx,ny}=clampPan(rawX, rawY, iw, ih, fw, fh);
        img.style.left=nx+'px';
        img.style.top =ny+'px';
        img.style.cursor='grabbing';
      } else {
        // Move the whole element box
        el.style.left=Math.round(ox+(e.clientX-sx)/zoom)+'px';
        el.style.top =Math.round(oy+(e.clientY-sy)/zoom)+'px';
        el.style.cursor='grabbing';
      }
    }

    function up(){
      el.style.cursor='';
      if(img) img.style.cursor = hasCrop ? 'grab' : '';
      if(committed){
        if(hasCrop) saveCropData(img);
        else debouncedPersist();
      }
      window.removeEventListener('mousemove',mv);
      window.removeEventListener('mouseup',up);
    }

    window.addEventListener('mousemove',mv);
    window.addEventListener('mouseup',up);
  });

  art.appendChild(el);
  return el;
}

function applyTextStyle(inner, cfg){
  inner.style.fontFamily=cfg.fontFamily||BF;
  inner.style.fontSize=cfg.fontSize||'13px';
  inner.style.fontWeight=cfg.fontWeight||'400';
  inner.style.fontStyle=cfg.fontStyle||'normal';
  inner.style.color=cfg.color||'#111';
  inner.style.lineHeight=cfg.lineHeight||'1.35';
  inner.style.padding=cfg.padding||'0';
  inner.style.textAlign=cfg.textAlign||'left';
  inner.style.letterSpacing=cfg.letterSpacing||'0';
  inner.style.whiteSpace='pre-wrap';
  inner.style.wordBreak='break-word';
  if(cfg.extraStyle) inner.style.cssText+=';'+cfg.extraStyle;
}

// ════════════════════════════════════════
// DRAG & RESIZE
// ════════════════════════════════════════
const DRAG_THRESHOLD = 4; // px — must move this far before drag begins

function startDrag(e, el){
  const sx=e.clientX, sy=e.clientY;
  const ox=parseFloat(el.style.left), oy=parseFloat(el.style.top);
  let dragging = false;

  function mv(e){
    if(!dragging){
      const dx=e.clientX-sx, dy=e.clientY-sy;
      if(Math.sqrt(dx*dx+dy*dy) < DRAG_THRESHOLD) return;
      // Threshold crossed — commit the snapshot and start moving
      undoSnapshot();
      dragging = true;
      el.style.cursor = 'grabbing';
    }
    el.style.left=Math.round(ox+(e.clientX-sx)/zoom)+'px';
    el.style.top=Math.round(oy+(e.clientY-sy)/zoom)+'px';
  }
  function up(){
    el.style.cursor = '';
    window.removeEventListener('mousemove',mv);
    window.removeEventListener('mouseup',up);
    if(dragging) debouncedPersist();
  }
  window.addEventListener('mousemove',mv);
  window.addEventListener('mouseup',up);
}

function startResize(e, el, handle){
  undoSnapshot();
  const sx=e.clientX, sy=e.clientY;
  const ow=parseFloat(el.style.width), oh=parseFloat(el.style.height);
  const ox=parseFloat(el.style.left), oy=parseFloat(el.style.top);
  function mv(e){
    const dx=(e.clientX-sx)/zoom, dy=(e.clientY-sy)/zoom;
    if(handle.includes('e')) el.style.width=Math.max(20,Math.round(ow+dx))+'px';
    if(handle.includes('s')) el.style.height=Math.max(8,Math.round(oh+dy))+'px';
    if(handle.includes('w')){el.style.width=Math.max(20,Math.round(ow-dx))+'px';el.style.left=Math.round(ox+dx)+'px';}
    if(handle.includes('n')){el.style.height=Math.max(8,Math.round(oh-dy))+'px';el.style.top=Math.round(oy+dy)+'px';}
  }
  function up(){window.removeEventListener('mousemove',mv);window.removeEventListener('mouseup',up);debouncedPersist();}
  window.addEventListener('mousemove',mv);
  window.addEventListener('mouseup',up);
}

// ════════════════════════════════════════
// CROP MODE — double-click an image to enter
// ════════════════════════════════════════
let cropEl = null; // the element currently being cropped

function enterCropMode(el){
  if(cropEl) exitCropMode();
  undoSnapshot();
  cropEl = el;
  el.classList.add('crop-mode');

  const inner = el.querySelector('.el-inner');
  const img   = el.querySelector('img');
  if(!img || img.style.display === 'none') { exitCropMode(); return; }

  const fw = parseFloat(el.style.width);
  const fh = parseFloat(el.style.height);

  // Switch img to explicit positioned sizing, preserving any existing crop
  let iw = parseFloat(img.dataset.cropW) || fw;
  let ih = parseFloat(img.dataset.cropH) || fh;
  let ix = parseFloat(img.dataset.cropX) || 0;
  let iy = parseFloat(img.dataset.cropY) || 0;

  if(!img.dataset.cropW){ iw=fw; ih=fh; ix=0; iy=0; }

  img.style.cssText = `position:absolute;left:${ix}px;top:${iy}px;width:${iw}px;height:${ih}px;object-fit:fill;display:block;`;

  // Dark overlay to show crop boundary
  const overlay = document.createElement('div');
  overlay.className = 'crop-overlay';
  inner.appendChild(overlay);

  // Label
  const label = document.createElement('div');
  label.className = 'crop-label';
  label.textContent = 'CROP — drag to pan  ·  drag corners to scale  ·  click outside to finish';
  el.appendChild(label);

  // Pan by dragging the image
  img.style.cursor = 'grab';
  img.addEventListener('mousedown', onCropPan);

  // 4 corner scale handles
  ['nw','ne','sw','se'].forEach(pos=>{
    const h = document.createElement('div');
    h.className = `crop-img-rh${(pos==='ne'||pos==='sw')?' crop-img-rh-'+pos:''}`;
    h.dataset.cropHandle = pos;
    h.style.cssText = buildCropHandleStyle(pos, ix, iy, iw, ih);
    h.addEventListener('mousedown', onCropScale);
    el.appendChild(h);
  });

  // Click outside to exit
  setTimeout(()=> document.addEventListener('mousedown', onCropOutsideClick), 50);
}

function buildCropHandleStyle(pos, ix, iy, iw, ih){
  const x = pos.includes('e') ? ix+iw-6 : ix-6;
  const y = pos.includes('s') ? iy+ih-6 : iy-6;
  return `left:${x}px;top:${y}px;`;
}

function repositionCropHandles(el, img){
  const ix = parseFloat(img.style.left);
  const iy = parseFloat(img.style.top);
  const iw = parseFloat(img.style.width);
  const ih = parseFloat(img.style.height);
  el.querySelectorAll('.crop-img-rh').forEach(h=>{
    const pos = h.dataset.cropHandle;
    const x = pos.includes('e') ? ix+iw-6 : ix-6;
    const y = pos.includes('s') ? iy+ih-6 : iy-6;
    h.style.left = x+'px';
    h.style.top  = y+'px';
  });
}

// Clamp pan so at least `MIN` px of the image is always visible inside the frame
function clampPan(nx, ny, iw, ih, fw, fh){
  const MIN = 20;
  // image right edge must be at least MIN px inside frame left
  const maxX = fw - MIN;
  // image left edge must be at most (iw - MIN) past frame right  
  const minX = -(iw - MIN);
  const maxY = fh - MIN;
  const minY = -(ih - MIN);
  return {
    nx: Math.min(maxX, Math.max(minX, nx)),
    ny: Math.min(maxY, Math.max(minY, ny))
  };
}

function onCropPan(e){
  e.stopPropagation();
  const img = e.currentTarget;
  const el  = cropEl;
  const fw  = parseFloat(el.style.width);
  const fh  = parseFloat(el.style.height);
  const sx  = e.clientX, sy = e.clientY;
  const ox  = parseFloat(img.style.left), oy = parseFloat(img.style.top);
  let panning = false;
  function mv(e){
    const dx=e.clientX-sx, dy=e.clientY-sy;
    if(!panning && Math.sqrt(dx*dx+dy*dy) < DRAG_THRESHOLD) return;
    if(!panning){ panning=true; img.style.cursor='grabbing'; }
    const rawX = ox + (e.clientX-sx)/zoom;
    const rawY = oy + (e.clientY-sy)/zoom;
    const iw = parseFloat(img.style.width);
    const ih = parseFloat(img.style.height);
    const {nx, ny} = clampPan(rawX, rawY, iw, ih, fw, fh);
    img.style.left = nx+'px';
    img.style.top  = ny+'px';
    repositionCropHandles(el, img);
  }
  function up(){
    img.style.cursor='grab';
    if(panning) saveCropData(img);
    window.removeEventListener('mousemove',mv);
    window.removeEventListener('mouseup',up);
  }
  window.addEventListener('mousemove',mv);
  window.addEventListener('mouseup',up);
}

function onCropScale(e){
  e.stopPropagation();
  const h   = e.currentTarget;
  const el  = cropEl;
  const img = el.querySelector('img');
  const pos = h.dataset.cropHandle;
  const fw  = parseFloat(el.style.width);
  const fh  = parseFloat(el.style.height);
  const sx  = e.clientX, sy = e.clientY;
  const ox  = parseFloat(img.style.left), oy = parseFloat(img.style.top);
  const ow  = parseFloat(img.style.width), oh = parseFloat(img.style.height);
  const aspect = ow / oh;

  function mv(e){
    const dx = (e.clientX-sx)/zoom;
    const dy = (e.clientY-sy)/zoom;
    let nw = ow, nh = oh, nx = ox, ny = oy;

    if(pos==='se'){ nw=Math.max(50,ow+dx); nh=nw/aspect; }
    else if(pos==='sw'){ nw=Math.max(50,ow-dx); nh=nw/aspect; nx=ox+(ow-nw); }
    else if(pos==='ne'){ nw=Math.max(50,ow+dx); nh=nw/aspect; ny=oy+(oh-nh); }
    else if(pos==='nw'){ nw=Math.max(50,ow-dx); nh=nw/aspect; nx=ox+(ow-nw); ny=oy+(oh-nh); }

    // Clamp after scale too
    const clamped = clampPan(nx, ny, nw, nh, fw, fh);
    img.style.width  = nw+'px';
    img.style.height = nh+'px';
    img.style.left   = clamped.nx+'px';
    img.style.top    = clamped.ny+'px';
    repositionCropHandles(el, img);
  }
  function up(){
    saveCropData(img);
    window.removeEventListener('mousemove',mv);
    window.removeEventListener('mouseup',up);
  }
  window.addEventListener('mousemove',mv);
  window.addEventListener('mouseup',up);
}

function saveCropData(img){
  img.dataset.cropX = img.style.left;
  img.dataset.cropY = img.style.top;
  img.dataset.cropW = img.style.width;
  img.dataset.cropH = img.style.height;
  // Mark the element as having crop so cursor changes
  const el = img.closest('.el');
  if(el) el.classList.add('has-crop');
  debouncedPersist();
}

function onCropOutsideClick(e){
  if(cropEl && !cropEl.contains(e.target)) exitCropMode();
}

function exitCropMode(){
  if(!cropEl) return;
  const el  = cropEl;
  const img = el.querySelector('img');

  // Save final crop data to dataset
  if(img) saveCropData(img);

  // Remove crop UI
  el.querySelectorAll('.crop-img-rh, .crop-label, .crop-overlay').forEach(n=>n.remove());
  if(img) img.removeEventListener('mousedown', onCropPan);
  el.classList.remove('crop-mode');
  cropEl = null;
  document.removeEventListener('mousedown', onCropOutsideClick);
  debouncedPersist();
}

// Add double-click to image elements to enter crop mode
// (called from createElement after img element is created)
function selectElement(el){
  if(selectedEl && selectedEl!==el) selectedEl.classList.remove('selected');
  selectedEl=el;
  el.classList.add('selected');
  showProps(el);
}

function deselectAll(){
  if(cropEl) exitCropMode();
  if(selectedEl) selectedEl.classList.remove('selected');
  selectedEl=null;
  document.getElementById('props-content').innerHTML='<div class="props-empty">Select an element on the canvas to edit its properties here.</div>';
}

function bgClick(e){
  if(e.target===document.getElementById('canvas-area')||e.target===document.getElementById('canvas-wrap')||e.target===document.getElementById('artwork')) deselectAll();
}

        <option value="img3" ${el.dataset.assetKey==='img3'?'selected':''}>Third Image</option>

function el_set(prop, val){
  if(!selectedEl) return;
  undoSnapshot();
  selectedEl.style[prop]=val;
}
function el_inner_set(prop, val){
  if(!selectedEl) return;
  undoSnapshot();
  const inner=selectedEl.querySelector('.el-inner');
  if(inner) inner.style[prop]=val;
}
function el_inner_txt(val){
  if(!selectedEl) return;
  const inner=selectedEl.querySelector('.el-inner');
  if(inner && inner.contentEditable!=='true') inner.textContent=val;
  // Also write back to sidebar master field if this element is linked
  const field=selectedEl.dataset.field;
  if(field){
    const sidebarId=fieldToSidebarId(field);
    if(sidebarId){
      const sidebarEl=document.getElementById(sidebarId);
      if(sidebarEl){
        let writeVal=val;
        if(field==='income' && writeVal.startsWith('Net Income: ')) writeVal=writeVal.slice('Net Income: '.length);
        sidebarEl.value=writeVal;
        globalSync();
      }
    }
  }
}
// Link a text element to a content field
function el_set_field(fieldKey){
  if(!selectedEl) return;
  undoSnapshot();
  selectedEl.dataset.field = fieldKey;
  // If linking to a field, immediately populate with current field value
  if(fieldKey){
    const val = getFieldVal(fieldKey);
    if(val !== null){
      const inner = selectedEl.querySelector('.el-inner');
      if(inner && selectedEl.dataset.type==='text') inner.textContent = val;
    }
  }
  // Refresh props panel so the status hint and border colour update
  showProps(selectedEl);
}

function el_set_asset(key){
  if(!selectedEl) return;
  undoSnapshot();
  selectedEl.dataset.assetKey=key;
  const img=selectedEl.querySelector('img');
  const ph=selectedEl.querySelector('.img-ph-txt');
  const inner=selectedEl.querySelector('.el-inner');
  const isLogo=key==='logo';
  if(inner) inner.style.background=isLogo?'transparent':'#c5ccc5';
  if(img) img.style.objectFit=isLogo?'contain':'cover';
  // Remove old placeholder if switching to logo (logo has no placeholder)
  if(isLogo && ph) ph.style.display='none';
  if(key && assets[key]){
    if(img){img.src=assets[key];img.style.display='';}
    if(ph) ph.style.display='none';
  } else {
    if(img){img.src='';img.style.display='none';}
    if(ph && !isLogo) ph.style.display='';
  }
  // Refresh props panel to reflect change
  showProps(selectedEl);
}

function deleteSelected(){
  if(!selectedEl) return;
  undoSnapshot();
  selectedEl.remove();
  selectedEl=null;
  document.getElementById('props-content').innerHTML='<div class="props-empty">Select an element on the canvas to edit its properties here.</div>';
  debouncedPersist();
}

// rgb(r,g,b) → #rrggbb
function rgbToHex(str){
  if(!str||str==='') return '#000000';
  if(str.startsWith('#')) return str.length===4?'#'+str[1]+str[1]+str[2]+str[2]+str[3]+str[3]:str;
  const m=str.match(/\d+/g);
  if(!m||m.length<3) return '#000000';
  return '#'+m.slice(0,3).map(x=>parseInt(x).toString(16).padStart(2,'0')).join('');
}

// ════════════════════════════════════════
// SAVE / RESTORE STATE
// ════════════════════════════════════════
function serializeTab(){
  const art=document.getElementById('artwork');
  const els=[];
  art.querySelectorAll('.el').forEach(el=>{
    const inner=el.querySelector('.el-inner');
    const img=el.querySelector('img');
    const ak=el.dataset.assetKey||'';
    const obj={
      eid:el.dataset.eid, type:el.dataset.type,
      x:el.style.left, y:el.style.top, w:el.style.width, h:el.style.height, z:el.style.zIndex,
      field:el.dataset.field, assetKey:ak,
    };
    if(inner){
      obj.innerStyle=inner.getAttribute('style')||'';
      if(el.dataset.type==='text') obj.content=inner.textContent;
      // Store img src: prefer assets store (always up to date), fall back to element src
      if(el.dataset.type==='img'){
        obj.imgSrc = (ak && assets[ak]) ? assets[ak] : (img ? img.src : '');
        // Save crop state if image has been cropped
        if(img && img.dataset.cropW){
          obj.cropX=img.dataset.cropX; obj.cropY=img.dataset.cropY;
          obj.cropW=img.dataset.cropW; obj.cropH=img.dataset.cropH;
        }
      }
    }
    els.push(obj);
  });
  return els;
}

function restoreTab(idx){
  if(!savedStates[idx]) return false;
  const art=document.getElementById('artwork');
  const cw=document.getElementById('canvas-wrap');
  const s=SIZES[idx];
  art.style.width=s[0]+'px';
  art.style.height=s[1]+'px';
  art.style.background=idx===4?DK:'#fff';
  art.style.transform=`scale(${zoom})`;
  art.style.transformOrigin='top left';
  art.style.position='absolute';
  art.style.top='0';
  art.style.left='0';
  cw.style.width=Math.round(s[0]*zoom)+'px';
  cw.style.height=Math.round(s[1]*zoom)+'px';
  art.innerHTML='';
  selectedEl=null;
  const state=savedStates[idx];
  state.forEach(sv=>{
    const cfg={
      id:sv.eid, type:sv.type,
      x:parseFloat(sv.x), y:parseFloat(sv.y), w:parseFloat(sv.w), h:parseFloat(sv.h), z:parseInt(sv.z)||2,
      field:sv.field, assetKey:sv.assetKey,
    };
    const el=createElement(cfg);
    const inner=el.querySelector('.el-inner');
    // Apply saved style FIRST
    if(inner && sv.innerStyle) inner.setAttribute('style', sv.innerStyle);
    // Always ensure text elements have pre-wrap (may be missing in older saves)
    if(sv.type==='text' && inner){
      inner.style.whiteSpace='pre-wrap';
      inner.style.wordBreak='break-word';
    }
    if(sv.content!==undefined && inner && sv.type==='text') inner.textContent=sv.content;
    // Apply images AFTER innerStyle (overrides any display:none from innerStyle)
    if(sv.type==='img'){
      const img=el.querySelector('img');
      const ph=el.querySelector('.img-ph-txt');
      const isLogo=sv.assetKey==='logo';
      // Re-apply correct background & object-fit
      if(inner){ inner.style.background=isLogo?'transparent':'#c5ccc5'; }
      // Use assets store as source of truth, fall back to saved imgSrc
      const src=(sv.assetKey && assets[sv.assetKey]) ? assets[sv.assetKey] : sv.imgSrc;
      if(src){
        if(img){
          img.src=src;
          // Restore crop state if saved
          if(sv.cropW){
            img.style.cssText=`position:absolute;left:${sv.cropX};top:${sv.cropY};width:${sv.cropW};height:${sv.cropH};object-fit:fill;display:block;`;
            img.dataset.cropX=sv.cropX; img.dataset.cropY=sv.cropY;
            img.dataset.cropW=sv.cropW; img.dataset.cropH=sv.cropH;
            el.classList.add('has-crop');
          } else {
            img.style.cssText=`position:absolute;inset:0;width:100%;height:100%;object-fit:${isLogo?'contain':'cover'};display:block;`;
          }
        }
        if(ph) ph.style.display='none';
      } else {
        if(img) img.style.display='none';
        if(ph && !isLogo) ph.style.display='';
      }
    }
  });
  return true;
}

function resetTab(){
  if(confirm('Reset this template to default? Your edits will be lost.')){
    delete savedStates[currentTab];
    buildTemplate(currentTab);
  }
}

// ════════════════════════════════════════
// GLOBAL SYNC (sidebar fields → elements)
// ════════════════════════════════════════
function globalSync(){
  // 1. Update elements on the currently visible tab (live DOM)
  document.querySelectorAll('.el[data-field]').forEach(el=>{
    const field=el.dataset.field;
    if(!field) return;
    const val=getFieldVal(field);
    if(val===null) return;
    const inner=el.querySelector('.el-inner');
    if(inner && el.dataset.type==='text') inner.textContent=val;
  });

  // 2. Update savedStates for ALL other tabs
  //    For tabs that split bullets/bodycopy into multiple elements (no field attr),
  //    we flag them for a full rebuild next time they're visited.
  for(const [tabIdx, state] of Object.entries(savedStates)){
    const ti=parseInt(tabIdx);
    if(ti===currentTab) continue; // live DOM already handled above
    if(!state) continue;
    state.forEach(sv=>{
      if(sv.type!=='text' || !sv.field) return;
      const val=getFieldVal(sv.field);
      if(val===null) return;
      sv.content=val;
    });
  }

  // 3. Save current tab state so its savedStates entry stays current
  savedStates[currentTab]=serializeTab();

  debouncedPersist();
}

// Called when switching to a tab — rebuilds if fields have changed since last visit
function syncTabOnEntry(idx){
  if(!savedStates[idx]) return; // will be built fresh — already uses current field values
  const state=savedStates[idx];
  // Walk every element and push current field values in
  state.forEach(sv=>{
    if(sv.type!=='text' || !sv.field) return;
    const val=getFieldVal(sv.field);
    if(val!==null) sv.content=val;
  });
}

function getFieldVal(field){
  const map={
    heading:gv('fh'), subheading:gv('fs'), address1:gv('fa1'), address2:gv('fa2'),
    banner:gv('fb'), income:gv('fi')?'Net Income: '+gv('fi'):'',
    bullets:gv('fbull'), bodycopy:gv('fbc'),
    salemethod:gv('fm'), saledate:gv('fd'),
    agent1name:gv('fn1'), agent1num:gv('fp1'),
    agent2name:gv('fn2'), agent2num:gv('fp2'),
    agent3name:gv('fn3'), agent3num:gv('fp3'),
  };
  return map[field]??null;
}

// When bullets/income/bodycopy change, tabs that expand them into
// multiple unlabelled elements need a full rebuild on next visit.
// We clear their savedStates so buildTemplate() runs fresh.
function onBulletFieldChange(){
  for(let i=0;i<8;i++){
    if(i===currentTab) continue;
    if(savedStates[i]) delete savedStates[i]; // force rebuild on next visit
  }
  globalSync();
}

// ════════════════════════════════════════
// ASSETS
// ════════════════════════════════════════
function loadAsset(e, key){
  const f=e.target.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=ev=>{
    assets[key]=ev.target.result;
    const isLogo=key==='logo';
    // Update all elements currently on the canvas
    document.querySelectorAll(`.el[data-asset-key="${key}"]`).forEach(el=>{
      const img=el.querySelector('img');
      const ph=el.querySelector('.img-ph-txt');
      const inner=el.querySelector('.el-inner');
      if(inner) inner.style.background=isLogo?'transparent':'#c5ccc5';
      if(img){img.src=ev.target.result;img.style.display='';img.style.objectFit=isLogo?'contain':'cover';}
      if(ph) ph.style.display='none';
    });
    // Also update imgSrc in all saved states so other tabs get it when restored
    Object.keys(savedStates).forEach(tabIdx=>{
      savedStates[tabIdx].forEach(sv=>{
        if(sv.assetKey===key) sv.imgSrc=ev.target.result;
      });
    });
    // Persist immediately — assets are important
    persistAll();
  };
  r.readAsDataURL(f);
}

// ─── INJECT CBRE LOGOS into a freshly built template ───
// Called at end of every buildXxx() function.
// Adds a white CBRE logo and (where appropriate) a green CBRE logo
// as moveable/deleteable image elements.
function addCBRELogos(W, H, positions){
  // positions: array of {x,y,w,h,uri,label,z}
  positions.forEach(p=>{
    const id = nextId++;
    const el = document.createElement('div');
    el.className='el';
    el.dataset.eid = id;
    el.dataset.type = 'img';
    el.dataset.field = '';
    el.dataset.assetKey = '';
    el.style.cssText = `left:${p.x}px;top:${p.y}px;width:${p.w}px;height:${p.h}px;z-index:${p.z||20};`;

    const inner = document.createElement('div');
    inner.className = 'el-inner';
    inner.style.cssText = 'background:transparent;display:flex;align-items:center;justify-content:center;';

    const img = document.createElement('img');
    img.src = p.uri;
    img.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;object-fit:contain;display:block;';
    inner.appendChild(img);
    el.appendChild(inner);

    // sel ring
    const ring=document.createElement('div');ring.className='el-sel-ring';el.appendChild(ring);
    // resize handles
    ['nw','n','ne','e','se','s','sw','w'].forEach(pos=>{
      const h=document.createElement('div');h.className=`rh rh-${pos}`;h.dataset.h=pos;
      h.addEventListener('mousedown',e=>{e.stopPropagation();startResize(e,el,pos);});
      el.appendChild(h);
    });
    // drag / select
    el.addEventListener('mousedown',e=>{
      if(e.target.classList.contains('rh')) return;
      e.stopPropagation();
      selectElement(el);
      const sx=e.clientX, sy=e.clientY;
      const ox=parseFloat(el.style.left), oy=parseFloat(el.style.top);
      let committed=false;
      function mv(e){
        const dx=e.clientX-sx, dy=e.clientY-sy;
        if(Math.sqrt(dx*dx+dy*dy)<DRAG_THRESHOLD) return;
        if(!committed){committed=true;undoSnapshot();}
        el.style.left=Math.round(ox+(e.clientX-sx)/zoom)+'px';
        el.style.top=Math.round(oy+(e.clientY-sy)/zoom)+'px';
        el.style.cursor='grabbing';
      }
      function up(){
        el.style.cursor='';
        if(committed) debouncedPersist();
        window.removeEventListener('mousemove',mv);
        window.removeEventListener('mouseup',up);
      }
      window.addEventListener('mousemove',mv);
      window.addEventListener('mouseup',up);
    });

    document.getElementById('artwork').appendChild(el);
  });
}

function buildTemplate(idx){
  const art=document.getElementById('artwork');

  art.style.width=s[0]+'px';
  art.style.height=s[1]+'px';
  art.style.background=idx===4?DK:'#fff';
  art.style.transform=`scale(${zoom})`;
  art.style.transformOrigin='top left';
  art.style.position='absolute';
  art.style.top='0';
  art.style.left='0';
  cw.style.width=Math.round(s[0]*zoom)+'px';
  cw.style.height=Math.round(s[1]*zoom)+'px';
  // Now clear content
  art.innerHTML='';
  selectedEl=null;
  nextId=1;
  deselectAll();
  document.getElementById('props-content').innerHTML='<div class="props-empty">Select an element on the canvas to edit its properties here.</div>';
  [buildAFR2,buildAFR4,buildAuction,buildBrochure1,buildBrochure2,buildEDM,buildLinkedIn,buildSignboard][idx](s[0],s[1]);
}

// ════════════════════════════════════════
// DOWNLOAD PDF (print-to-PDF)
// ════════════════════════════════════════
// PDF RENDERER — high-res html2canvas (exact screen match)
// ════════════════════════════════════════

// ════════════════════════════════════════
// PDF RENDERER — hybrid vector/image
// • Rects   → native jsPDF vector fills (crisp, scalable)
// • Images  → native jsPDF addImage with correct aspect-ratio clipping
// • Text    → native jsPDF text (vector, Helvetica/Times match sizes exactly)
// • Unvisited tabs built on-demand from default builders
// ════════════════════════════════════════

// Parse any CSS colour string → [r,g,b]
function _rgb(str){
  if(!str||str==='transparent'||str==='none') return null;
  str=str.trim();
  if(str.startsWith('#')){
    let h=str.slice(1);
    if(h.length===3) h=h[0]+h[0]+h[1]+h[1]+h[2]+h[2];
    const n=parseInt(h,16);
    return [(n>>16)&255,(n>>8)&255,n&255];
  }
  const m=str.match(/rgba?\s*\(\s*(\d+)[,\s]+(\d+)[,\s]+(\d+)/);
  if(m) return [+m[1],+m[2],+m[3]];
  // Resolve named colours via a throwaway canvas pixel
  try{
    const cv=document.createElement('canvas');cv.width=cv.height=1;
    const cx=cv.getContext('2d');cx.fillStyle=str;cx.fillRect(0,0,1,1);
    const d=cx.getImageData(0,0,1,1).data;
    if(d[3]===0) return null;
    return [d[0],d[1],d[2]];
  }catch(e){return null;}
}

// Build the state array for a tab (uses saved state or constructs defaults)
function _stateForTab(tabIdx){
  if(savedStates[tabIdx] && savedStates[tabIdx].length) return savedStates[tabIdx];
  // Build into the real artwork div temporarily so builders work normally
  const [cw,ch]=SIZES[tabIdx];
  const realArt=document.getElementById('artwork');
  const prevHTML=realArt.innerHTML;
  const prevW=realArt.style.width, prevH=realArt.style.height;
  const prevT=realArt.style.transform, prevNI=nextId;
  realArt.style.width=cw+'px'; realArt.style.height=ch+'px';
  realArt.style.transform='none'; realArt.innerHTML=''; nextId=1;
  const builders=[buildAFR2,buildAFR4,buildAuction,buildBrochure1,
                  buildBrochure2,buildEDM,buildLinkedIn,buildSignboard];
  builders[tabIdx](cw,ch);
  const state=serializeTabFrom(realArt);
  realArt.innerHTML=prevHTML; realArt.style.width=prevW;
  realArt.style.height=prevH; realArt.style.transform=prevT; nextId=prevNI;
  return state;
}

// Serialize elements from any artwork div (not just the live one)
function serializeTabFrom(art){
  const els=[];
  art.querySelectorAll('.el').forEach(el=>{
    const inner=el.querySelector('.el-inner');
    const img=el.querySelector('img');
    const ak=el.dataset.assetKey||'';
    const obj={
      eid:el.dataset.eid, type:el.dataset.type,
      x:el.style.left, y:el.style.top, w:el.style.width, h:el.style.height,
      z:el.style.zIndex, field:el.dataset.field||'', assetKey:ak,
    };
    if(inner){
      obj.innerStyle=inner.getAttribute('style')||'';
      if(el.dataset.type==='text') obj.content=inner.textContent;
      if(el.dataset.type==='img'){
        obj.imgSrc=(ak&&assets[ak])?assets[ak]:(img?img.src:'');
        if(img&&img.dataset.cropW){
          obj.cropX=img.dataset.cropX; obj.cropY=img.dataset.cropY;
          obj.cropW=img.dataset.cropW; obj.cropH=img.dataset.cropH;
        }
      }
    }
    els.push(obj);
  });
  return els;
}

async function renderTabToPdf(pdf, tabIdx, pageW, pageH, addPage){
  if(addPage){
    pdf.addPage([pageW,pageH], pageW>pageH?'landscape':'portrait');
  }

  const [canvasW,canvasH]=SIZES[tabIdx];
  const sx=pageW/canvasW, sy=pageH/canvasH;

  // Background
  const bgCol=tabIdx===4?_rgb(DK):[255,255,255];
  if(bgCol){ pdf.setFillColor(...bgCol); pdf.rect(0,0,pageW,pageH,'F'); }

  const state=_stateForTab(tabIdx);
  if(!state||!state.length) return;

  const sorted=[...state].sort((a,b)=>(parseInt(a.z)||0)-(parseInt(b.z)||0));

  // Helper: write a clipping rect + draw image in one correct PDF graphics block
  function addImageClipped(src, fmt, ix, iy, iw, ih, cx, cy, cw, ch){
    const sc = pdf.internal.scaleFactor;
    const pH = pdf.internal.pageSize.getHeight();
    // Convert mm → PDF units (bottom-left origin)
    const pdfX  = (cx * sc).toFixed(4);
    const pdfY  = ((pH - cy - ch) * sc).toFixed(4);
    const pdfW  = (cw * sc).toFixed(4);
    const pdfH  = (ch * sc).toFixed(4);
    pdf.saveGraphicsState();
    // Push clip rect using raw PDF stream operators
    pdf.internal.write(`${pdfX} ${pdfY} ${pdfW} ${pdfH} re W n`);
    pdf.addImage(src, fmt, ix, iy, iw, ih, undefined, 'FAST');
    pdf.restoreGraphicsState();
  }

  for(const sv of sorted){
    const x=parseFloat(sv.x)*sx;
    const y=parseFloat(sv.y)*sy;
    const w=parseFloat(sv.w)*sx;
    const h=parseFloat(sv.h)*sy;
    if(!w||!h) continue;

    // ── RECT (vector) ─────────────────────────────────────────────────────
    if(sv.type==='rect'){
      const ist=sv.innerStyle||'';
      const bgm=ist.match(/background(?:-color)?\s*:\s*([^;]+)/);
      const col=bgm?_rgb(bgm[1].trim()):_rgb(DK);
      if(col){ pdf.setFillColor(...col); pdf.rect(x,y,w,h,'F'); }
    }

    // ── IMAGE (native, correct aspect ratio) ─────────────────────────────
    else if(sv.type==='img'){
      const src=(sv.assetKey&&assets[sv.assetKey])?assets[sv.assetKey]:sv.imgSrc;
      if(!src) continue;
      const fmt=src.startsWith('data:image/png')?'PNG':'JPEG';
      try{
        if(sv.cropW){
          // Manual crop: img is positioned/sized explicitly
          const iw=parseFloat(sv.cropW)*sx;
          const ih=parseFloat(sv.cropH)*sy;
          const ix=parseFloat(sv.cropX)*sx;
          const iy=parseFloat(sv.cropY)*sy;
          addImageClipped(src, fmt, x+ix, y+iy, iw, ih, x, y, w, h);
        } else {
          // Get natural image size to compute cover/contain correctly
          const nat=await new Promise(res=>{
            const im=new Image();
            im.onload=()=>res({w:im.naturalWidth,h:im.naturalHeight});
            im.onerror=()=>res(null);
            im.src=src;
          });
          if(!nat){ pdf.addImage(src,fmt,x,y,w,h,undefined,'FAST'); continue; }
          const isLogo=sv.assetKey==='logo';
          if(isLogo){
            // object-fit:contain — fit inside, centered
            const scale=Math.min(w/nat.w, h/nat.h);
            const dw=nat.w*scale, dh=nat.h*scale;
            pdf.addImage(src,fmt,x+(w-dw)/2,y+(h-dh)/2,dw,dh,undefined,'FAST');
          } else {
            // object-fit:cover — fill box, clip overflow, centered
            const scale=Math.max(w/nat.w, h/nat.h);
            const dw=nat.w*scale, dh=nat.h*scale;
            addImageClipped(src, fmt, x+(w-dw)/2, y+(h-dh)/2, dw, dh, x, y, w, h);
          }
        }
      }catch(e){ console.warn('img skip',e); }
    }

    // ── TEXT — rasterised at high DPI so fonts look exactly like screen ───
    else if(sv.type==='text'){
      if(!sv.content) continue;
      try{
        // Build a tiny off-screen div with just this text element
        const elW=parseFloat(sv.w), elH=parseFloat(sv.h);
        const SCALE=4; // 4× = ~300dpi equivalent
        const holder=document.createElement('div');
        holder.style.cssText=`position:fixed;left:-99999px;top:0;width:${elW}px;height:${elH}px;overflow:hidden;background:transparent;`;
        document.body.appendChild(holder);

        const textEl=document.createElement('div');
        textEl.style.cssText=`position:absolute;inset:0;overflow:hidden;`;
        if(sv.innerStyle) textEl.setAttribute('style', sv.innerStyle);
        textEl.style.whiteSpace='pre-wrap';
        textEl.style.wordBreak='break-word';
        textEl.style.overflow='hidden';
        textEl.style.background='transparent';
        textEl.textContent=sv.content;
        holder.appendChild(textEl);

// ════════════════════════════════════════════════════════════════
// CLOUD SAVE / LOAD (Supabase)
// In demo mode: falls back to localStorage
// In Supabase mode: saves state JSON to `projects` table
//                   and image files to `assets` storage bucket
// ════════════════════════════════════════════════════════════════

const LS_KEY = `cbre_builder_${_portfolioId}_${_propertyId}`;

// ── UPLOAD IMAGE to Supabase Storage (or store as base64 in demo mode) ──
async function uploadAsset(e, key){
  const f = e.target.files[0]; if(!f) return;
  const progEl = document.getElementById('prog-'+key);
  if(progEl){ progEl.style.display='block'; progEl.textContent='Uploading…'; }

  if(IS_DEMO){
    // Demo mode: store base64 in localStorage (same as original behaviour)
    const r = new FileReader();
    r.onload = ev => {
      assets[key] = ev.target.result;
      applyAssetToCanvas(key, ev.target.result);
      if(progEl){ progEl.textContent='✓ Uploaded'; setTimeout(()=>progEl.style.display='none',1500); }
      debouncedPersist();
    };
    r.readAsDataURL(f);
    return;
  }

  // Supabase Storage upload
  try {
    const path = `${_portfolioId}/${_propertyId}/${key}_${Date.now()}.${f.name.split('.').pop()}`;
    const res = await fetch(`${SUPABASE_URL}/storage/v1/object/assets/${path}`, {
      method: 'POST',
      headers: {
        'apikey': SUPABASE_ANON_KEY,
        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
        'Content-Type': f.type,
      },
      body: f,
    });
    if(!res.ok) throw new Error(await res.text());
    const publicUrl = `${SUPABASE_URL}/storage/v1/object/public/assets/${path}`;
    assets[key] = publicUrl;
    applyAssetToCanvas(key, publicUrl);
    if(progEl){ progEl.textContent='✓ Saved to cloud'; setTimeout(()=>progEl.style.display='none',2000); }
    debouncedPersist();
  } catch(err){
    console.error('Upload failed:', err);
    if(progEl){ progEl.textContent='Upload failed'; setTimeout(()=>progEl.style.display='none',3000); }
    // Fallback to base64
    const r = new FileReader();
    r.onload = ev => { assets[key]=ev.target.result; applyAssetToCanvas(key,ev.target.result); debouncedPersist(); };
    r.readAsDataURL(f);
  }
}

// Apply a loaded asset URL/base64 to all matching canvas elements
function applyAssetToCanvas(key, src){
  const isLogo = key === 'logo';
  document.querySelectorAll(`.el[data-asset-key="${key}"]`).forEach(el => {
    const img = el.querySelector('img');
    const ph  = el.querySelector('.img-ph-txt');
    const inner = el.querySelector('.el-inner');
    if(inner) inner.style.background = isLogo ? 'transparent' : '#c5ccc5';
    if(img){ img.src=src; img.style.display=''; img.style.objectFit=isLogo?'contain':'cover'; }
    if(ph) ph.style.display='none';
  });
  // Update all saved states
  Object.keys(savedStates).forEach(ti => {
    (savedStates[ti]||[]).forEach(sv => { if(sv.assetKey===key) sv.imgSrc=src; });
  });
}

// Keep loadAsset as alias for compatibility with any remaining calls
function loadAsset(e, key){ uploadAsset(e, key); }

// ── SAVE TO CLOUD ──
async function saveToCloud(){
  const btn = document.querySelector('.btn-save');
  btn.textContent = '☁ Saving…'; btn.disabled = true;
  setCloudStatus('saving', 'Saving…');

  // Always save current tab to savedStates first
  savedStates[currentTab] = serializeTab();

  const state = collectState();

  if(IS_DEMO){
    // Demo: localStorage
    try {
      localStorage.setItem(LS_KEY, JSON.stringify(state));
      setCloudStatus('saved', 'Saved locally');
      btn.textContent = '✓ Saved!'; btn.style.background='#1a6e3a';
      setTimeout(()=>{ btn.textContent='☁ Save'; btn.style.background=''; btn.disabled=false; }, 2000);
    } catch(e){
      setCloudStatus('error', 'Save failed');
      btn.textContent='☁ Save'; btn.style.background=''; btn.disabled=false;
      alert('Save failed: ' + e.message);
    }
    return;
  }

  // Supabase: upsert into projects table
  try {
    const payload = {
      portfolio_id: _portfolioId,
      property_id: _propertyId,
      state_json: JSON.stringify(state),
      updated_at: new Date().toISOString(),
    };
    const res = await fetch(`${SUPABASE_URL}/rest/v1/projects?portfolio_id=eq.${_portfolioId}&property_id=eq.${_propertyId}`, {
      method: 'GET',
      headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` },
    });
    const existing = await res.json();
    let upsertRes;
    if(existing && existing.length > 0){
      upsertRes = await fetch(`${SUPABASE_URL}/rest/v1/projects?id=eq.${existing[0].id}`, {
        method: 'PATCH',
        headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}`, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
        body: JSON.stringify(payload),
      });
    } else {
      upsertRes = await fetch(`${SUPABASE_URL}/rest/v1/projects`, {
        method: 'POST',
        headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}`, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
        body: JSON.stringify(payload),
      });
    }
    if(!upsertRes.ok) throw new Error('Save failed: ' + await upsertRes.text());
    setCloudStatus('saved', 'Saved to cloud');
    btn.textContent = '✓ Saved!'; btn.style.background='#1a6e3a';
    setTimeout(()=>{ btn.textContent='☁ Save'; btn.style.background=''; btn.disabled=false; }, 2000);
  } catch(err){
    console.error(err);
    // Fallback to localStorage
    try { localStorage.setItem(LS_KEY, JSON.stringify(state)); } catch(e2){}
    setCloudStatus('error', 'Cloud error – saved locally');
    btn.textContent='☁ Save'; btn.style.background=''; btn.disabled=false;
    alert('Cloud save failed. Your work has been saved locally as a backup.\n\nError: ' + err.message);
  }
}

// ── LOAD FROM CLOUD ──
async function loadFromCloud(){
  setCloudStatus('saving', 'Loading…');

  if(IS_DEMO){
    try {
      const raw = localStorage.getItem(LS_KEY);
      if(raw){
        const data = JSON.parse(raw);
        if(applyState(data)){ setCloudStatus('saved', 'Loaded'); return true; }
      }
    } catch(e){ console.warn('localStorage load failed', e); }
    setCloudStatus('saved', 'Ready (new)');
    return false;
  }

  try {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/projects?portfolio_id=eq.${_portfolioId}&property_id=eq.${_propertyId}&select=state_json`,
      { headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` } }
    );
    const rows = await res.json();
    if(rows && rows.length && rows[0].state_json){
      const data = JSON.parse(rows[0].state_json);
      if(applyState(data)){ setCloudStatus('saved', 'Loaded from cloud'); return true; }
    }
    setCloudStatus('saved', 'Ready (new)');
    return false;
  } catch(err){
    console.warn('Cloud load failed, trying localStorage:', err);
    try {
      const raw = localStorage.getItem(LS_KEY);
      if(raw){ const data=JSON.parse(raw); if(applyState(data)){ setCloudStatus('error','Cloud error – loaded local backup'); return true; } }
    } catch(e2){}
    setCloudStatus('error', 'Load failed');
    return false;
  }
}

// ── AUTO-SAVE debounce ──
let _persistTimer = null;
function debouncedPersist(){
  clearTimeout(_persistTimer);
  _persistTimer = setTimeout(()=>{
    savedStates[currentTab] = serializeTab();
    try { localStorage.setItem(LS_KEY, JSON.stringify(collectState())); } catch(e){}
  }, 800);
}
function persistAll(){ debouncedPersist(); }

// ── COLLECT / APPLY STATE (includes hiddenTabs) ──
function collectState(){
  savedStates[currentTab] = serializeTab();
  return {
    tabs: savedStates,
    assets: assets,
    currentTab: currentTab,
    zoom: Math.round(zoom*100),
    hiddenTabs: [...hiddenTabs],
    fields: {
      fh:gv('fh'),fs:gv('fs'),fa1:gv('fa1'),fa2:gv('fa2'),
      fb:gv('fb'),fbull:document.getElementById('fbull').value,
      fi:gv('fi'),fbc:document.getElementById('fbc').value,
      fm:gv('fm'),fd:gv('fd'),
      fn1:gv('fn1'),fp1:gv('fp1'),
      fn2:gv('fn2'),fp2:gv('fp2'),
      fn3:gv('fn3'),fp3:gv('fp3'),
    },
  };
}

function applyState(data){
  if(!data) return false;
  try {
    // Restore fields
    if(data.fields){
      Object.entries(data.fields).forEach(([k,v])=>{
        const el=document.getElementById(k); if(el) el.value=v;
      });
    }
    if(data.assets) assets=data.assets;
    if(data.zoom) setZoom(data.zoom);
    if(data.tabs) savedStates=data.tabs;
    // Restore hidden tabs
    if(data.hiddenTabs){
      hiddenTabs = new Set(data.hiddenTabs.map(Number));
      document.querySelectorAll('.tab').forEach((t,i)=>{
        const isHidden = hiddenTabs.has(i);
        t.classList.toggle('hidden-tab', isHidden);
        const cb = document.getElementById('mi-'+i);
        if(cb) cb.checked = !isHidden;
      });
    }
    const tabIdx = typeof data.currentTab==='number' ? data.currentTab : 0;
    currentTab = tabIdx;
    document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',i===tabIdx));
    if(savedStates[tabIdx]){ restoreTab(tabIdx); }
    else { buildTemplate(tabIdx); }
    return true;
  } catch(e){ console.warn('applyState failed', e); return false; }
}

// Legacy alias used inside template builders
function saveTab(){ saveToCloud(); }

// ════════════════════════════════════════
// INIT
// ════════════════════════════════════════
async function init(){
  const hadSaved = await loadFromCloud();
  if(!hadSaved){ buildTemplate(0); setZoom(65); }

  // Auto-save hooks
  document.querySelectorAll('#fh,#fs,#fa1,#fa2,#fb,#fbull,#fi,#fbc,#fm,#fd,#fn1,#fp1,#fn2,#fp2,#fn3,#fp3')
    .forEach(el=>el.addEventListener('input', debouncedPersist));
  document.getElementById('canvas-area').addEventListener('mouseup', debouncedPersist);
  document.getElementById('zoom-range').addEventListener('input', debouncedPersist);

  window.addEventListener('beforeunload', ()=>{
    clearTimeout(_persistTimer);
    try { localStorage.setItem(LS_KEY, JSON.stringify(collectState())); } catch(e){}
  });
}

init();
